name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE: /api
        run: |
          npm ci
          npm run build

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: dom, mbstring, pdo_mysql
          tools: composer:v2

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Prepare deploy directory
        run: |
          mkdir -p .deploy/scripts
          cp -R frontend/dist/. .deploy/
          cp -R backend/api .deploy/api
          cp -R backend/config .deploy/config
          cp -R backend/middleware .deploy/middleware
          cp -R backend/migrations .deploy/migrations
          cp -R backend/services .deploy/services
          cp -R backend/vendor .deploy/vendor
          cp backend/scripts/migrate-web.php .deploy/scripts/migrate-web.php
          cat > .deploy/.env <<'ENV'
          APP_ENV=production
          APP_DEBUG=${{ secrets.APP_DEBUG || 'false' }}
          APP_URL=https://shalalekka.prabudha.com
          MIGRATE_SECRET=${{ secrets.MIGRATE_SECRET }}
          ALLOWED_ORIGINS=https://shalalekka.prabudha.com,http://localhost:5177,http://127.0.0.1:5177

          FIN_DB_HOST=${{ secrets.FIN_DB_HOST || 'localhost' }}
          FIN_DB_NAME=${{ secrets.FIN_DB_NAME }}
          FIN_DB_USER=${{ secrets.FIN_DB_USER }}
          FIN_DB_PASS=${{ secrets.FIN_DB_PASS }}

          ANU_DB1_HOST=${{ secrets.ANU_DB1_HOST || 'localhost' }}
          ANU_DB1_NAME=${{ secrets.ANU_DB1_NAME }}
          ANU_DB1_USER=${{ secrets.ANU_DB1_USER }}
          ANU_DB1_PASS=${{ secrets.ANU_DB1_PASS }}

          ANU_DB2_HOST=${{ secrets.ANU_DB2_HOST || 'localhost' }}
          ANU_DB2_NAME=${{ secrets.ANU_DB2_NAME }}
          ANU_DB2_USER=${{ secrets.ANU_DB2_USER }}
          ANU_DB2_PASS=${{ secrets.ANU_DB2_PASS }}

          CENTRAL_DB_HOST=${{ secrets.CENTRAL_DB_HOST || 'localhost' }}
          CENTRAL_DB_NAME=${{ secrets.CENTRAL_DB_NAME }}
          CENTRAL_DB_USER=${{ secrets.CENTRAL_DB_USER }}
          CENTRAL_DB_PASS=${{ secrets.CENTRAL_DB_PASS }}
          ENV
          cat > .deploy/.htaccess <<'HTACCESS'
          Options -Indexes
          RewriteEngine On

          SetEnv FINANCE_CORS_BY_APACHE 1

          SetEnvIfNoCase Origin "^https://shalalekka\.prabudha\.com$" FINANCE_ALLOWED_ORIGIN=$0
          SetEnvIfNoCase Origin "^http://localhost:5177$" FINANCE_ALLOWED_ORIGIN=$0
          SetEnvIfNoCase Origin "^http://127\.0\.0\.1:5177$" FINANCE_ALLOWED_ORIGIN=$0

          Header always set Access-Control-Allow-Origin "%{FINANCE_ALLOWED_ORIGIN}e" env=FINANCE_ALLOWED_ORIGIN
          Header always set Access-Control-Allow-Credentials "true" env=FINANCE_ALLOWED_ORIGIN
          Header always set Access-Control-Allow-Methods "GET,POST,PUT,OPTIONS" env=FINANCE_ALLOWED_ORIGIN
          Header always set Access-Control-Allow-Headers "Content-Type, X-School-Code" env=FINANCE_ALLOWED_ORIGIN
          Header always set Vary "Origin" env=FINANCE_ALLOWED_ORIGIN

          RewriteRule ^(config|middleware|services|vendor)(/|$) - [F,L]
          RewriteRule ^scripts/(?!migrate-web\.php) - [F,L]
          RewriteRule ^api(?:/.*)?$ api/index.php [QSA,L]

          RewriteCond %{REQUEST_FILENAME} -f [OR]
          RewriteCond %{REQUEST_FILENAME} -d
          RewriteRule ^ - [L]

          RewriteRule ^ index.html [L]

          <FilesMatch "^\.env">
            Require all denied
          </FilesMatch>
          HTACCESS

      - name: Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ${{ secrets.HOSTINGER_FTP_PROTOCOL || 'ftp' }}
          port: ${{ secrets.HOSTINGER_FTP_PORT || 21 }}
          local-dir: .deploy/
          server-dir: ./

      - name: Run DB migrations
        run: |
          echo "--- Calling migration endpoint ---"
          HTTP_CODE=$(curl -s -o /tmp/migrate-result.json -w "%{http_code}" \
            -H "X-Migrate-Secret: ${{ secrets.MIGRATE_SECRET }}" \
            https://shalalekka.prabudha.com/scripts/migrate-web.php)
          echo "HTTP status: $HTTP_CODE"
          echo "Response body:"
          cat /tmp/migrate-result.json
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Migration endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi
          python3 -c "
          import json,sys
          r=json.load(open('/tmp/migrate-result.json'))
          for m in r['migrations']:
              print(m['status'].upper(), m['file'], m.get('message',''))
          failed=[m for m in r['migrations'] if m['status']=='fail']
          sys.exit(1 if failed else 0)
          "
